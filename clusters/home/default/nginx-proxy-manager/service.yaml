apiVersion: v1
kind: Service
metadata:
  name: nginx-proxy-manager
  namespace: default
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.0.80
  ports:
    - port: 80
      targetPort: 80
    - port: 443
      targetPort: 443
    - port: 81
      targetPort: 81
  selector:
    app: nginx-proxy-manager
