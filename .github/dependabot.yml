version: 2
updates:
  - package-ecosystem: "docker"
    directory: "/portainer/endpoints/local/stacks/plex"
    schedule:
      interval: "daily"
      time: "03:00"
      timezone: "Europe/Dublin"
    allow:
      - dependency-name: "lscr.io/linuxserver/plex"
    open-pull-requests-limit: 1
    labels:
      - "dependencies"
      - "plex"
    commit-message:
      prefix: "chore(deps)"
