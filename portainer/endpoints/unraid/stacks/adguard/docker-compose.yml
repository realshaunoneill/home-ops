version: "3.8"

services:
  adguard:
    image: adguard/adguardhome:latest
    container_name: adguard
    restart: unless-stopped

    # Host networking so AdGuard can serve DNS on :53 cleanly and see real
    # client IPs. Web UI is reached via the local Traefik (dynamic/adguard.yml)
    # or directly at http://192.168.0.10:3000.
    network_mode: host

    volumes:
      - /mnt/user/appdata/adguard/work:/opt/adguardhome/work
      - /mnt/user/appdata/adguard/conf:/opt/adguardhome/conf
