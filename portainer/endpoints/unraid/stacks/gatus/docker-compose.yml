version: "3.8"

services:
  gatus:
    image: ghcr.io/twin/gatus:latest
    container_name: gatus
    restart: unless-stopped
    environment:
      - TZ=Europe/Dublin
      # Gatus reads config from this path (file or directory).
      - GATUS_CONFIG_PATH=/config/config.yaml
    volumes:
      # Monitor definitions are versioned in git next to this compose file.
      - ./config:/config:ro
      # Persist uptime history across restarts.
      - /mnt/user/appdata/gatus:/data
    ports:
      # Routed by the local Traefik via dynamic/gatus.yml (file provider),
      # same as the other unraid services (bazarr, prowlarr, nzbget...).
      - "3001:8080"
