version: "3.8"

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest@sha256:5f26407fd2ede54df76d63304ef184576a6c1bb73f934a58a11abdd852fab549
    container_name: wg-easy
    restart: unless-stopped

    environment:
      - WG_HOST=local.home.shaunoneill.com
      - PASSWORD_HASH=${PASSWORD_HASH}
      - WG_PORT=51820
      # LAN resolver (router) so VPN clients resolve internal *.home.shaunoneill.com
      # via the same working LAN route, not dependent on WAN NAT out of the tunnel.
      - WG_DEFAULT_DNS=192.168.0.1
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0
      - WG_PERSISTENT_KEEPALIVE=25

    volumes:
      - /mnt/user/appdata/wg-easy:/etc/wireguard

    #ports:
      #- "51820:51820/udp"
      #- "51821:51821/tcp"   # remove later if using Traefik
    network_mode: host

    cap_add:
      - NET_ADMIN
      - SYS_MODULE


