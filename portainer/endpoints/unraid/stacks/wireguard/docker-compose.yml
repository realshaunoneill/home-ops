version: "3.8"

services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:latest
    container_name: wg-easy
    restart: unless-stopped

    environment:
      - WG_HOST=local.home.shaunoneill.com
      - PASSWORD_HASH=${PASSWORD_HASH}
      - WG_PORT=51820
      - WG_DEFAULT_DNS=1.1.1.1,1.0.0.1
      - WG_ALLOWED_IPS=0.0.0.0/0,::/0
      - WG_PERSISTENT_KEEPALIVE=25

    volumes:
      - /mnt/user/appdata/wg-easy:/etc/wireguard

    #ports:
      #- "51820:51820/udp"
      #- "51821:51821/tcp"   # remove later if using Traefik
    network_mode: host

    cap_add:
      - NET_ADMIN
      - SYS_MODULE


