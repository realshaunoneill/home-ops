version: "3.8"

# Paperless-ngx — self-hosted document management with OCR, tagging, full-text
# search. Backend: Postgres + Redis. Companion services (gotenberg + tika) let
# it consume Office docs / emails in addition to PDFs / images.
#
# Web UI: https://paperless.home.shaunoneill.com  (Traefik route on the local
# host — see traefik stack). Direct LAN: http://192.168.0.10:8010
#
# Drop files into /mnt/user/documents/paperless/consume on unraid and they
# will be auto-imported.

services:
  broker:
    image: docker.io/library/redis:7-alpine
    container_name: paperless-redis
    restart: unless-stopped
    volumes:
      - redisdata:/data

  db:
    image: docker.io/library/postgres:16
    container_name: paperless-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data

  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.34
    container_name: paperless-gotenberg
    restart: unless-stopped
    # The gotenberg chromium API is used by paperless to convert Office /
    # e-mail attachments to PDF. Disable JS to reduce attack surface and
    # allow only file:// so it can render local temp files.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"

  tika:
    image: docker.io/apache/tika:3.3.1.0
    container_name: paperless-tika
    restart: unless-stopped

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:2.20.15
    container_name: paperless
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - "8010:8000"
    volumes:
      # Config, database migrations, search index.
      - /mnt/user/appdata/paperless/data:/usr/src/paperless/data
      # Where the archived / processed originals live — put on the array.
      - /mnt/user/documents/paperless/media:/usr/src/paperless/media
      # Export target for `document_exporter` runs.
      - /mnt/user/documents/paperless/export:/usr/src/paperless/export
      # Drop files here to auto-import.
      - /mnt/user/documents/paperless/consume:/usr/src/paperless/consume
    environment:
      # Redis broker
      PAPERLESS_REDIS: redis://broker:6379
      # Postgres backend
      PAPERLESS_DBHOST: db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      # Django secret used for sessions / crypto — keep stable and secret.
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      # Behind Traefik on HTTPS.
      PAPERLESS_URL: https://paperless.home.shaunoneill.com
      PAPERLESS_TIME_ZONE: Europe/Dublin
      PAPERLESS_OCR_LANGUAGE: eng
      # Tika / gotenberg for Office + email support.
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      # Bootstrap superuser on first run. After first login change the password
      # via the web UI; changing the env later has no effect.
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER}
      PAPERLESS_ADMIN_PASSWORD: ${PAPERLESS_ADMIN_PASSWORD}
      # Run any encrypted PDF through pikepdf with our known-good passwords
      # before consumption. Script is inlined below as a `configs:` entry so
      # it lives with the compose file (no bind-mount to go stale on redeploy).
      PAPERLESS_PRE_CONSUME_SCRIPT: /usr/src/paperless/scripts/pre-consume-decrypt.py
      # Run as the unraid share owner so files land with sane perms.
      USERMAP_UID: 99
      USERMAP_GID: 100
      TZ: Europe/Dublin

    configs:
      - source: pre_consume_decrypt
        target: /usr/src/paperless/scripts/pre-consume-decrypt.py
        mode: 0755

volumes:
  pgdata:
  redisdata:

configs:
  pre_consume_decrypt:
    content: |
      #!/usr/bin/env python3
      """Pre-consume decrypt for paperless-ngx.

      Runs before paperless ingests a file (via PAPERLESS_PRE_CONSUME_SCRIPT).
      For encrypted PDFs, try our known passwords in order and, on success,
      overwrite the file in-place with the decrypted bytes. Non-PDFs and
      already-unencrypted PDFs are left alone. Always exits 0 so consumption
      continues even if we can't unlock (paperless will just store the file
      encrypted as before).

      IMPORTANT (paperless-ngx v2 semantics): paperless invokes this script
      with the ORIGINAL consume-folder path as argv[1], but internally uses a
      working copy (taken *before* this script runs) for the actual stored
      document. We must therefore modify DOCUMENT_WORKING_PATH (env var), not
      argv[1], or the decrypted file will never make it into the archive.
      Modifying both is safest.
      """
      import os
      import sys

      PASSWORDS = ["23091998", "230998"]

      def log(msg):
          print(f"[pre-consume-decrypt] {msg}", flush=True)

      def try_decrypt_in_place(path):
          """Return True if decrypted (or already plain), False on real failure."""
          if not path or not os.path.exists(path):
              return True
          if not path.lower().endswith(".pdf"):
              return True
          try:
              import pikepdf
          except ImportError:
              log("pikepdf not installed; skipping")
              return True
          try:
              pikepdf.open(path).close()
              return True  # not encrypted
          except pikepdf.PasswordError:
              pass
          except Exception as e:
              log(f"open failed for {path}: {e}")
              return True
          for pw in PASSWORDS:
              try:
                  pdf = pikepdf.open(path, password=pw)
              except pikepdf.PasswordError:
                  continue
              except Exception as e:
                  log(f"unexpected error trying '{pw}' on {path}: {e}")
                  return True
              tmp = path + ".decrypting.tmp"
              try:
                  pdf.save(tmp)
              finally:
                  pdf.close()
              os.replace(tmp, path)
              log(f"unlocked {os.path.basename(path)} with pw #{PASSWORDS.index(pw) + 1}")
              return True
          log(f"no known password unlocked {os.path.basename(path)}")
          return True

      def main():
          # Paperless-ngx sets DOCUMENT_WORKING_PATH to the internal working
          # copy that actually becomes the stored source. Modify it.
          working = os.environ.get("DOCUMENT_WORKING_PATH")
          original = sys.argv[1] if len(sys.argv) >= 2 else None

          # Deduplicate — sometimes the same file. Modify both to be safe.
          targets = []
          for p in (working, original):
              if p and p not in targets:
                  targets.append(p)
          if not targets:
              return 0

          for p in targets:
              try_decrypt_in_place(p)
          return 0

      if __name__ == "__main__":
          sys.exit(main())
