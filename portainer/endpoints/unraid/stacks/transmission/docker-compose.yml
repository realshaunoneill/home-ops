version: "3.8"

services:
  transmission:
    image: ghcr.io/linuxserver/transmission:latest@sha256:0913501f5d05c019f5e3555a3299df1d8de420fdf882c92a8857787f9fbf999d
    container_name: transmission
    restart: unless-stopped
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Dublin
    volumes:
      - /mnt/user/shared/services/transmission/config:/config
      - /mnt/user/plex/torrent:/plex/torrent
    ports:
      - "9091:9091"
      - "51413:51413"
      - "51413:51413/udp"
