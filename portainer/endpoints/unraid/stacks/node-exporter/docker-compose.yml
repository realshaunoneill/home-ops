version: "3.8"

services:
  node-exporter:
    image: prom/node-exporter:v1.12.1
    container_name: node-exporter
    restart: unless-stopped

    pid: host

    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      # Extra unraid-specific mounts to keep out of the filesystem collector.
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker|mnt/user0|mnt/addons|mnt/rootshare)($$|/)"

    volumes:
      # Unraid's root FS isn't propagation-shared, so the usual `rslave`
      # option that Prometheus docs suggest fails with:
      #   "path / is mounted on / but it is not a shared or slave mount"
      # Plain :ro is enough — we only lose visibility into mounts that
      # appear after node_exporter starts, which is fine here.
      - /:/host:ro

    # Published so Prometheus on the local endpoint can scrape
    # 192.168.0.10:9100/metrics across hosts.
    ports:
      - "9100:9100"
