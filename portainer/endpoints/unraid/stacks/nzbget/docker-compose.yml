version: "3.8"

services:
  nzbget:
    image: ghcr.io/linuxserver/nzbget:latest@sha256:87eba87ec46982b003ab1f54cfabd962c5c5e95cb9eb2069cbec7b6370d0784b
    container_name: nzbget
    restart: unless-stopped
    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Dublin
    volumes:
      - /mnt/user/shared/services/nzbget/config:/config
      - /mnt/user/plex/usenet:/plex/usenet
    ports:
      - "6789:6789"
