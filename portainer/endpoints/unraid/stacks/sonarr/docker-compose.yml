version: "3.8"

services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest@sha256:fbb15bb4fb14d1ffe017f6be0e3fed8f1b300e4687e329767da0b61f36ba1eed
    container_name: sonarr
    restart: unless-stopped

    environment:
      - PUID=99
      - PGID=100
      - TZ=Europe/Dublin

    volumes:
      - /mnt/user/appdata/sonarr:/config
      - /mnt/user/plex/TV:/plex/TV
      - /mnt/user/plex/Sports:/plex/Sports
      - /mnt/user/plex/torrent/complete/tv:/plex/torrent/complete/tv
      - /mnt/user/plex/usenet/completed/tv:/plex/usenet/completed/tv

    ports:
      - "8989:8989"


