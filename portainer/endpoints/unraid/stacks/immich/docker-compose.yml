version: "3.8"

# Immich — self-hosted photo/video backup with mobile auto-upload apps
# (iOS + Android), face recognition, and ML-powered search.
#
# Web UI: https://immich.home.shaunoneill.com  (Traefik route on the local
# host — see traefik stack). Direct LAN: http://192.168.0.10:2283
#
# Mobile: install the "Immich" app, point it at the URL above, log in with the
# account you create via the web UI on first visit, and enable auto-backup.
#
# Storage layout on unraid:
#   /mnt/user/photos/immich          -> original uploads (large, on the array)
#   /mnt/user/appdata/immich/pgdata  -> postgres data (small, ideally on cache)
#
# Postgres MUST be the immich-app image (vectorchord + pgvector extensions);
# a plain postgres:15/16 will not work — Immich stores CLIP embeddings.

services:
  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:v3.0.3
    restart: unless-stopped
    depends_on:
      - redis
      - database
    ports:
      - "2283:2283"
    volumes:
      - /mnt/user/photos/immich:/data
      - /etc/localtime:/etc/localtime:ro
    environment:
      TZ: Europe/Dublin
      DB_HOSTNAME: database
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE_NAME: immich
      REDIS_HOSTNAME: redis

  immich-machine-learning:
    container_name: immich_machine_learning
    image: ghcr.io/immich-app/immich-machine-learning:v3.0.3
    restart: unless-stopped
    volumes:
      - model-cache:/cache
    environment:
      TZ: Europe/Dublin

  redis:
    container_name: immich_redis
    # Upstream Immich switched from redis to valkey; keeping in sync avoids
    # surprises when they change the required client protocol.
    image: docker.io/valkey/valkey:9-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]

  database:
    container_name: immich_postgres
    # Must be the immich-app postgres image (vectorchord + pgvector extensions).
    # A vanilla postgres image will fail migrations.
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: immich
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - /mnt/user/appdata/immich/pgdata:/var/lib/postgresql/data
    shm_size: 128mb

volumes:
  model-cache:
