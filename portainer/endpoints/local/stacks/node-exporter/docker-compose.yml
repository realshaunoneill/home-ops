version: "3.8"

services:
  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: node-exporter
    restart: unless-stopped

    # Report host-level metrics (all processes, host FS) rather than the
    # container's private view.
    pid: host

    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

    volumes:
      - /:/host:ro,rslave

    # No host port published — Prometheus scrapes over the `proxy` docker
    # network at node-exporter:9100.
    networks:
      - proxy

networks:
  proxy:
    external: true
