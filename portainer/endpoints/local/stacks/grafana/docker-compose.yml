version: "3.8"

services:
  grafana:
    image: grafana/grafana:13.1.1
    container_name: grafana
    restart: unless-stopped

    environment:
      - TZ=Europe/Dublin

      # Admin bootstrap — set in Portainer stack env (do NOT commit).
      # If unset on first boot, Grafana defaults to admin/admin.
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}

      # Correct external URL so share links / redirects work behind Traefik.
      - GF_SERVER_ROOT_URL=https://grafana.home.shaunoneill.com
      - GF_SERVER_DOMAIN=grafana.home.shaunoneill.com

      # Lock down: no self-signup, no anonymous access.
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=false

      # Kill telemetry / update pings.
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_FEEDBACK_LINKS_ENABLED=false

    volumes:
      # Persist sqlite DB, plugins, and any UI-created dashboards across
      # redeploys. Directory must be owned by UID 472 (grafana) on the host:
      #   sudo mkdir -p /opt/grafana/data && sudo chown -R 472:472 /opt/grafana
      - /opt/grafana/data:/var/lib/grafana
      # Versioned dashboards from ./dashboards/*.json. Relative-path bind
      # mounts require the stack to have been created with "Enable relative
      # path volumes" turned on (SupportRelativePath=true, FilesystemPath=
      # /opt/grafana/repo). See the gatus stack for the same pattern.
      - ./dashboards:/etc/grafana/dashboards:ro

    # Inline provisioning — versioned in git. Add datasources / dashboards
    # here and pull-and-redeploy; Grafana picks them up on start. Uses the
    # same inline `configs:` pattern as the traefik stack (self-contained,
    # survives redeploys, no relative-path bind mounts).
    configs:
      - source: gf_datasources
        target: /etc/grafana/provisioning/datasources/datasources.yml
      - source: gf_dashboards_provider
        target: /etc/grafana/provisioning/dashboards/dashboards.yml

    ports:
      # Direct access at http://<host>:3300 — bypasses Traefik for debugging.
      # Host :3000 is taken by AdGuard's web UI, :3001 by an unmanaged
      # express-api container.
      - "3300:3000"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.grafana.rule=Host(`grafana.home.shaunoneill.com`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"

    networks:
      - proxy
      - default

networks:
  proxy:
    external: true

configs:
  # Datasource provisioning — Prometheus lives on the same docker `proxy`
  # network, so Grafana reaches it by container name. Edit this block and
  # pull-and-redeploy to add more sources.
  # https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
  gf_datasources:
    content: |
      apiVersion: 1
      datasources:
        - name: Prometheus
          type: prometheus
          uid: prometheus
          access: proxy
          url: http://prometheus:9090
          isDefault: true
          editable: false
          jsonData:
            timeInterval: 30s
            httpMethod: POST

  # Dashboard provider — Grafana watches /etc/grafana/dashboards/*.json and
  # imports/updates them on start (and every 30s if allowUiUpdates=false).
  # https://grafana.com/docs/grafana/latest/administration/provisioning/#dashboards
  gf_dashboards_provider:
    content: |
      apiVersion: 1
      providers:
        - name: home-ops
          orgId: 1
          folder: home-ops
          type: file
          disableDeletion: false
          allowUiUpdates: true
          updateIntervalSeconds: 30
          options:
            path: /etc/grafana/dashboards
            foldersFromFilesStructure: false
