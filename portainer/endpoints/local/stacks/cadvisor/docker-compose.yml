version: "3.8"

services:
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    restart: unless-stopped

    # cAdvisor needs privileged access to read cgroup + container stats.
    privileged: true
    devices:
      - /dev/kmsg

    command:
      # Only Docker containers (skip raw machine cgroups noise).
      - "--docker_only=true"
      - "--housekeeping_interval=30s"
      - "--store_container_labels=false"

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

    # No host port published — Prometheus scrapes over the `proxy` docker
    # network at cadvisor:8080.
    networks:
      - proxy

networks:
  proxy:
    external: true
