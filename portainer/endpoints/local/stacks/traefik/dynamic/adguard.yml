http:
  routers:
    adguard:
      rule: "Host(`adguard.home.shaunoneill.com`)"
      entryPoints:
        - websecure
      service: adguard
      tls:
        certResolver: myresolver

  services:
    adguard:
      loadBalancer:
        servers:
          # AdGuard Home admin UI. During first-run setup it listens on :3000;
          # keep the admin port at 3000 in the setup wizard so this stays valid.
          - url: "http://192.168.0.10:3000"
