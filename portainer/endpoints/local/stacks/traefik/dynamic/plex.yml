http:
  routers:
    plex:
      rule: "Host(`plex.home.shaunoneill.com`)"
      entryPoints:
        - websecure
      middlewares:
        - plex-web-redirect
      service: plex
      tls:
        certResolver: myresolver

  middlewares:
    plex-web-redirect:
      redirectRegex:
        regex: "^https?://([^/]+)/?$"
        # Land directly in the web app with bypass=1 so it talks straight to this
        # server and skips the plex.tv discovery round-trip (useful on networks
        # that block plex.tv). Temporary (302) so browsers don't cache it hard.
        replacement: "https://${1}/web/index.html#!/?bypass=1"
        permanent: false

  services:
    plex:
      loadBalancer:
        servers:
          - url: "http://192.168.0.20:32400"
