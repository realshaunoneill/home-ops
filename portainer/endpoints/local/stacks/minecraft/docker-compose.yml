services:
  mc:
    image: itzg/minecraft-server:latest@sha256:e77d5de73b2906f7f8d96b5fb920e840fc925fffad2fccd95ee637b7daee5a5b
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "25575:25575"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      MEMORY: "1536M"
      USE_AIKAR_FLAGS: "true"
      USE_MEOWICE_FLAGS: "true"
      FORCE_GAMEMODE: "true"
      RCON_PASSWORD: "${RCON_PASSWORD}"
      VIEW_DISTANCE: "6"
    volumes:
      - "/opt/minecraft/data:/data"
