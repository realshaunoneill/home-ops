version: '3.8'

services:
  tautulli:
    image: tautulli/tautulli:latest@sha256:f66f65c3e5b60b94eb9dc9848fbe983009b4705f1795e4c979b961251c9637ad
    container_name: tautulli
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Dublin
    ports:
      - "8181:8181" # Direct access via IP:8181 (optional with Traefik)
    volumes:
      - /opt/tautulli/config:/config # Persistent config directory
    labels:
      - "traefik.enable=true"
      # Pin the network Traefik uses to reach this container. Without this,
      # when a container is on multiple networks Traefik's docker provider
      # sometimes picks the non-`proxy` IP and every request hangs at the
      # backend hop until it times out (Traefik itself only lives on `proxy`).
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.tautulli.rule=Host(`tautulli.home.shaunoneill.com`)"
      - "traefik.http.routers.tautulli.entrypoints=websecure"
      - "traefik.http.routers.tautulli.tls.certresolver=myresolver"
      - "traefik.http.services.tautulli.loadbalancer.server.port=8181"
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true
