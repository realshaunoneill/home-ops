version: '3.8'

services:
  tautulli:
    image: tautulli/tautulli:latest
    container_name: tautulli
    restart: unless-stopped
    ports:
      - "8181:8181" # Direct access via IP:8181 (optional with Traefik)
    volumes:
      - /opt/tautulli/config:/config # Persistent config directory
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tautulli.rule=Host(`tautulli.home.shaunoneill.com`)"
      - "traefik.http.routers.tautulli.entrypoints=websecure"
      - "traefik.http.routers.tautulli.tls.certresolver=myresolver"
      - "traefik.http.services.tautulli.loadbalancer.server.port=8181"
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true
