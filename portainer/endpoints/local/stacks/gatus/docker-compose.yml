version: "3.8"

services:
  gatus:
    image: ghcr.io/twin/gatus:latest
    container_name: gatus
    restart: unless-stopped
    environment:
      - TZ=Europe/Dublin
      - GATUS_CONFIG_PATH=/config/config.yaml
    volumes:
      # Monitor definitions are versioned in git next to this compose file.
      # Requires the stack to be created in Portainer with "Enable relative
      # path volumes" turned on, so the repo is checked out onto the host and
      # ./config resolves to the real folder (not an empty auto-created dir).
      - ./config:/config:ro
      # Persist uptime history across restarts.
      - /opt/gatus/data:/data
    ports:
      # Direct access at http://<host>:8092 — bypasses Traefik for debugging.
      - "8092:8080"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.gatus.rule=Host(`uptime.home.shaunoneill.com`)"
      - "traefik.http.routers.gatus.entrypoints=websecure"
      - "traefik.http.routers.gatus.tls.certresolver=myresolver"
      - "traefik.http.services.gatus.loadbalancer.server.port=8080"
    networks:
      - proxy
      - default

networks:
  proxy:
    external: true
